<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Devonshire&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
    </style>
</head>

<body>
    <div>
        <button id="Toggle" style="padding: 10px 20px; border: 2px solid black; margin-top: 1rem; border-radius: 10px; font-size: 1.2rem; font-weight: 600;">Dark
            Mode</button>
    </div>

    <main>
        <h1>Focus Flow</h1>
        <div class="todo-list">
            <input type="text" id="input-Todo" placeholder="Enter Your Task">
            <button id="button">Add</button>
        </div>
        <div class="container">
            <div class="filter">
                <button id="allBtn">All</button>
                <button id="activeBtn">Active</button>
                <button id="completedBtn">Completed</button>
            </div>
            <p id="taskCount">Task : 0</p>
            <ul></ul>
        </div>
        <button id="Clear">Clear Task</button>
    </main>
    <div class="error"></div>
    <script src="script.js"></script>
</body>

</html>
